name: Starter Templates

on:
  workflow_dispatch:
    inputs:
      starter:
        description: "Starter repo to sync, or all"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - codex-python-starter
          - codex-node-typescript-starter
          - claude-python-starter
          - claude-node-typescript-starter

jobs:
  sync-starter-templates:
    name: sync-starter-templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check starter template token
        shell: bash
        env:
          STARTER_TEMPLATE_SYNC_TOKEN: ${{ secrets.STARTER_TEMPLATE_SYNC_TOKEN }}
        run: |
          if [ -z "${STARTER_TEMPLATE_SYNC_TOKEN:-}" ]; then
            echo "STARTER_TEMPLATE_SYNC_TOKEN is required to sync external starter template repos." >&2
            exit 1
          fi

      - name: Sync starter templates
        shell: bash
        env:
          STARTER: ${{ inputs.starter }}
          STARTER_TEMPLATE_SYNC_TOKEN: ${{ secrets.STARTER_TEMPLATE_SYNC_TOKEN }}
        run: ./scripts/update-starter-template.sh
